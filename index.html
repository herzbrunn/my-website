<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>רישום לקוח חדש</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f0f2f5;
    padding: 20px;
    direction: rtl;
  }
  .form-wrapper {
    max-width: 520px;
    margin: 0 auto;
    background: white;
    border-radius: 10px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    overflow: hidden;
  }
  .form-header {
    background: #1a7a4a;
    color: white;
    text-align: center;
    padding: 16px;
    font-size: 18px;
    font-weight: bold;
    letter-spacing: 0.5px;
  }
  .form-body { padding: 18px 20px; }
  .field {
    display: flex;
    align-items: center;
    border-bottom: 1px solid #e8e8e8;
    padding: 8px 0;
    gap: 10px;
  }
  .field:last-of-type { border-bottom: none; }
  label {
    min-width: 170px;
    font-size: 13px;
    color: #333;
    font-weight: 500;
    flex-shrink: 0;
  }
  label .req { color: #c00; margin-left: 2px; }
  input[type="text"], input[type="email"], input[type="number"], select {
    flex: 1;
    border: none;
    border-bottom: 1px solid #bbb;
    padding: 4px 6px;
    font-size: 13px;
    font-family: inherit;
    direction: rtl;
    background: transparent;
    outline: none;
  }
  input:focus, select:focus { border-bottom-color: #1a7a4a; }
  .date-group { display: flex; gap: 6px; flex: 1; }
  .date-group select { flex: 1; }
  .section-label {
    background: #1a7a4a;
    color: white;
    padding: 6px 10px;
    font-size: 13px;
    font-weight: bold;
    margin: 8px -20px;
    padding-right: 20px;
  }
  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid #e8e8e8;
  }
  .checkbox-row input[type="checkbox"] { width: 16px; height: 16px; }
  .checkbox-row label { min-width: auto; font-weight: normal; }
  .field.disabled { opacity: 0.4; pointer-events: none; }
  .bottom-bar {
    background: #e8f5ee;
    padding: 10px 20px;
    font-size: 12px;
    color: #555;
    border-top: 1px solid #cde;
  }
  .btn-row {
    display: flex;
    gap: 10px;
    padding: 14px 20px;
    background: #f8f8f8;
    border-top: 1px solid #ddd;
    justify-content: flex-start;
  }
  .btn-save {
    background: #1a7a4a;
    color: white;
    border: none;
    padding: 9px 22px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-save:hover { background: #155e3a; }
  .btn-close {
    background: #e0e0e0;
    color: #333;
    border: none;
    padding: 9px 18px;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-close:hover { background: #c8c8c8; }
  #copy-msg {
    display: none;
    color: #1a7a4a;
    font-weight: bold;
    font-size: 13px;
    margin-right: 10px;
    align-self: center;
  }
  .field-err input, .field-err select { border-bottom-color: #c00 !important; background: #fff0f0 !important; }
  .checkbox-err { background: #fff0f0; border-radius: 4px; }
  #err-msg {
    display: none;
    background: #fff0f0;
    color: #c00;
    font-weight: bold;
    font-size: 13px;
    padding: 8px 20px;
    border-top: 1px solid #fcc;
    text-align: center;
  }
</style>
</head>
<body>
<div class="form-wrapper">
  <div class="form-header">📋 רישום לקוח חדש</div>
  <div class="form-body">

    <div class="field">
      <label><span class="req">*</span> שם פרטי</label>
      <input type="text" id="f_shem_prati">
    </div>
    <div class="field">
      <label><span class="req">*</span> שם משפחה</label>
      <input type="text" id="f_shem_mishpacha">
    </div>
    <div class="field">
      <label><span class="req">*</span> ניי"ד</label>
      <input type="text" id="f_naid">
    </div>
    <div class="field">
      <label><span class="req">*</span> אימות ניי"ד</label>
      <input type="text" id="f_iymut_naid">
    </div>
    <div class="field">
      <label><span class="req">*</span> צבירה בפנסיה</label>
      <input type="text" id="f_tsevira" oninput="formatMoney(this)" inputmode="numeric">
    </div>
    <div class="field">
      <label><span class="req">*</span> הפקדה לפנסיה</label>
      <input type="text" id="f_hafkada" oninput="formatMoney(this)" inputmode="numeric">
    </div>
    <div class="field">
      <label><span class="req">*</span> חברה מתחרה</label>
      <select id="f_chevra">
        <option value="">-- בחר --</option>
        <option value="הראל">הראל</option>
        <option value="כלל">כלל</option>
        <option value="מגדל">מגדל</option>
        <option value="מור">מור</option>
        <option value="הפניקס">הפניקס</option>
        <option value="מיטב">מיטב</option>
      </select>
    </div>
    <div class="field">
      <label><span class="req">*</span> מספר שנים בחברה</label>
      <input type="number" id="f_shanim">
    </div>
    <div class="field" style="flex-direction: column; align-items: flex-start; gap: 4px;">
      <label><span class="req">*</span> תאריך לידה</label>
      <div class="date-group" style="width: 100%;">
        <select id="f_leda_yom"><option value="">יום</option>
          <script>for(let i=1;i<=31;i++) document.write(`<option>${i}</option>`);</script>
        </select>
        <select id="f_leda_chodesh"><option value="">חודש</option>
          <script>['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'].forEach((m,i)=>document.write(`<option value="${i+1}">${m}</option>`));</script>
        </select>
        <select id="f_leda_shana"><option value="">שנה</option>
          <script>for(let y=2010;y>=1930;y--) document.write(`<option>${y}</option>`);</script>
        </select>
      </div>
    </div>
    <div class="field">
      <label><span class="req">*</span> מין</label>
      <select id="f_min">
        <option value="">-- בחר --</option>
        <option value="זכר">זכר</option>
        <option value="נקבה">נקבה</option>
      </select>
    </div>
    <div class="field">
      <label><span class="req">*</span> שפת לקוח</label>
      <select id="f_safa">
        <option value="">-- בחר --</option>
        <option value="עברית">עברית</option>
        <option value="ערבית">ערבית</option>
        <option value="רוסית">רוסית</option>
        <option value="אנגלית">אנגלית</option>
        <option value="צרפתית">צרפתית</option>
        <option value="אמהרית">אמהרית</option>
        <option value="ספרדית">ספרדית</option>
        <option value="גרמנית">גרמנית</option>
        <option value="אוקראינית">אוקראינית</option>
        <option value="רומנית">רומנית</option>
        <option value="תיגרינית">תיגרינית</option>
      </select>
    </div>
    <div class="field">
      <label><span class="req">*</span> אימייל</label>
      <input type="email" id="f_email">
    </div>
    <div class="field">
      <label><span class="req">*</span> אימות אימייל</label>
      <input type="email" id="f_iymut_email">
    </div>
    <div class="field">
      <label><span class="req">*</span> מקום עבודה</label>
      <input type="text" id="f_avoda">
    </div>
    <div class="field" style="flex-direction: column; align-items: flex-start; gap: 4px;">
      <label>תאריך יציאת כספים</label>
      <div class="date-group" style="width: 100%;">
        <select id="f_yetsia_yom"><option value="">יום</option>
          <script>for(let i=1;i<=31;i++) document.write(`<option>${i}</option>`);</script>
        </select>
        <select id="f_yetsia_chodesh"><option value="">חודש</option>
          <script>['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'].forEach((m,i)=>document.write(`<option value="${i+1}">${m}</option>`));</script>
        </select>
        <select id="f_yetsia_shana"><option value="">שנה</option>
          <script>for(let y=2060;y>=2024;y--) document.write(`<option>${y}</option>`);</script>
        </select>
      </div>
    </div>
    <div class="field">
      <label>הנחת תשואה</label>
      <input type="number" id="f_tnucha" value="8" step="0.1">
    </div>
    <div class="field">
      <label>ד"נ מהפקדה (מתחרה)</label>
      <input type="text" id="f_dn_hafkada_mit" value="1.50%">
    </div>
    <div class="field">
      <label>ד"נ צבירה (מתחרה)</label>
      <input type="text" id="f_dn_tsevira_mit" value="0.15%">
    </div>
    <div class="field">
      <label>ד"נ מהפקדה (מנורה)</label>
      <input type="text" id="f_dn_hafkada_men" value="0.90%">
    </div>
    <div class="field">
      <label>ד"נ צבירה (מנורה)</label>
      <input type="text" id="f_dn_tsevira_men" value="0.09%">
    </div>
    <div class="field">
      <label>סוג לקוח</label>
      <select id="f_mishpat">
        <option value="">-- בחר --</option>
        <option value="זרם בשיחה">🟢 זרם בשיחה</option>
        <option value="על הגדר">🟡 על הגדר</option>
        <option value="מתנגד">🔴 מתנגד</option>
        <option value="ממהר">⚡ ממהר</option>
        <option value="פסיבי">😐 פסיבי</option>
      </select>
    </div>

    <div class="section-label">👤 איש קשר נוסף</div>

    <div class="checkbox-row">
      <label for="f_yesh_ish_kesher">יש איש קשר נוסף</label>
      <input type="checkbox" id="f_yesh_ish_kesher" onchange="toggleContact(this.checked)">
    </div>
    <div class="field disabled" id="row_karva">
      <label>קרבה</label>
      <select id="f_karva">
        <option value="">-- בחר --</option>
        <option value="בעל">בעל</option>
        <option value="אישה">אישה</option>
        <option value="אח">אח</option>
        <option value="אחות">אחות</option>
        <option value="ילד/ה">ילד/ה</option>
        <option value="הורה">הורה</option>
        <option value="אחר">אחר</option>
      </select>
    </div>
    <div class="field disabled" id="row_contact_name">
      <label>שם איש קשר</label>
      <input type="text" id="f_contact_name">
    </div>
    <div class="field disabled" id="row_contact_phone">
      <label>טלפון איש קשר</label>
      <input type="text" id="f_contact_phone">
    </div>

    <div class="section-label">🔔 תזכורת</div>

    <div class="checkbox-row">
      <label for="f_tzkrt">קביעת תזכורת</label>
      <input type="checkbox" id="f_tzkrt" onchange="toggleFollowUp(this.checked)">
    </div>
    <div class="field disabled" id="row_fu_date" style="flex-direction: column; align-items: flex-start; gap: 4px;">
      <label>תאריך תזכורת</label>
      <div class="date-group" style="width: 100%;">
        <select id="f_fu_yom"><option value="">יום</option>
          <script>for(let i=1;i<=31;i++) document.write(`<option>${i}</option>`);</script>
        </select>
        <select id="f_fu_chodesh"><option value="">חודש</option>
          <script>['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'].forEach((m,i)=>document.write(`<option value="${i+1}">${m}</option>`));</script>
        </select>
        <select id="f_fu_shana"><option value="">שנה</option>
          <script>for(let y=new Date().getFullYear();y<=new Date().getFullYear()+5;y++) document.write(`<option>${y}</option>`);</script>
        </select>
      </div>
    </div>
    <div class="field disabled" id="row_fu_time" style="flex-direction: column; align-items: flex-start; gap: 4px;">
      <label>שעת תזכורת</label>
      <div class="date-group" style="width: 100%;">
        <select id="f_fu_shaa">
          <option value="">שעה</option>
          <script>for(let h=7;h<=21;h++) document.write(`<option value="${String(h).padStart(2,'0')}">${String(h).padStart(2,'0')}</option>`);</script>
        </select>
        <select id="f_fu_dakot">
          <option value="">דקות</option>
          <option value="00">00</option>
          <option value="15">15</option>
          <option value="30">30</option>
          <option value="45">45</option>
        </select>
      </div>
    </div>
    <div class="field disabled" id="row_fu_reason">
      <label>סיבת תזכורת</label>
      <select id="f_fu_reason">
        <option value="">-- בחר --</option>
        <option value="מעקב לאחר שיחה">מעקב לאחר שיחה</option>
        <option value="חידוש עניין">חידוש עניין</option>
        <option value="הצעת מחיר">הצעת מחיר</option>
        <option value="תזכורת סגירה">תזכורת סגירה</option>
        <option value="פגישה">פגישה</option>
        <option value="אחר">אחר</option>
      </select>
    </div>

    <div class="field">
      <label>טופס</label>
      <input type="text" id="f_tofes1">
    </div>
    <div class="field">
      <label>טופס</label>
      <input type="text" id="f_tofes2">
    </div>
    <div class="field">
      <label>טופס</label>
      <input type="text" id="f_tofes3">
    </div>
    <div class="field">
      <label>טופס</label>
      <input type="text" id="f_tofes4">
    </div>

  </div>

  <div id="err-msg"></div>
  <div class="bottom-bar">🔵 משפט פתיחה לשיחה הבאה</div>

  <div class="btn-row">
    <button class="btn-save" onclick="saveAndCopy()">💾 שמור</button>
    <button class="btn-close" onclick="clearForm()">✖ נקה</button>
    <span id="copy-msg">✅ הועתק ללוח!</span>
  </div>
</div>

<script>
function toggleContact(on) {
  ['row_karva','row_contact_name','row_contact_phone'].forEach(id => {
    document.getElementById(id).classList.toggle('disabled', !on);
  });
  if (!on) {
    document.getElementById('f_karva').selectedIndex = 0;
    document.getElementById('f_contact_name').value = '';
    document.getElementById('f_contact_phone').value = '';
  }
}

function toggleFollowUp(on) {
  ['row_fu_date','row_fu_time','row_fu_reason'].forEach(id => {
    document.getElementById(id).classList.toggle('disabled', !on);
  });
  if (!on) {
    ['f_fu_yom','f_fu_chodesh','f_fu_shana','f_fu_shaa','f_fu_dakot','f_fu_reason']
      .forEach(id => {
        const el = document.getElementById(id);
        if (el.tagName === 'SELECT') el.selectedIndex = 0;
        else el.value = '';
      });
  }
}

function formatMoney(el) {
  const raw = el.value.replace(/,/g, '');
  if (!/^\d*$/.test(raw)) { el.value = el.value.slice(0, -1); return; }
  if (!raw) return;
  const sel = el.selectionStart;
  const oldLen = el.value.length;
  const formatted = Number(raw).toLocaleString('en-US');
  el.value = formatted;
  const diff = formatted.length - oldLen;
  el.setSelectionRange(sel + diff, sel + diff);
}

function showErr(msg) {
  const el = document.getElementById('err-msg');
  el.textContent = '⚠ ' + msg;
  el.style.display = 'block';
}
function clearErr() {
  document.getElementById('err-msg').style.display = 'none';
  document.querySelectorAll('.field-err').forEach(el => el.classList.remove('field-err'));
  document.querySelectorAll('.checkbox-err').forEach(el => el.classList.remove('checkbox-err'));
}
function markErr(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const row = el.closest('.field') || el.closest('.checkbox-row');
  if (row) row.classList.add('field-err');
}

function validate() {
  clearErr();
  let ok = true;

  const name = document.getElementById('f_shem_prati').value.trim();
  if (!name) { markErr('f_shem_prati'); ok = false; }

  const last = document.getElementById('f_shem_mishpacha').value.trim();
  if (!last) { markErr('f_shem_mishpacha'); ok = false; }

  const phone  = document.getElementById('f_naid').value.replace(/-/g,'').replace(/ /g,'');
  const phone2 = document.getElementById('f_iymut_naid').value.replace(/-/g,'').replace(/ /g,'');
  const phoneValid = phone.length === 10 && phone.startsWith('05') && /^\d+$/.test(phone);
  if (!phoneValid) { markErr('f_naid'); ok = false; }
  if (!phone2 || phone !== phone2) { markErr('f_iymut_naid'); ok = false; }

  if (!document.getElementById('f_tsevira').value.replace(/,/g,'').trim()) { markErr('f_tsevira'); ok = false; }
  if (!document.getElementById('f_hafkada').value.replace(/,/g,'').trim()) { markErr('f_hafkada'); ok = false; }
  if (!document.getElementById('f_chevra').value)         { markErr('f_chevra');  ok = false; }
  if (!document.getElementById('f_shanim').value.trim())  { markErr('f_shanim');  ok = false; }
  if (!document.getElementById('f_min').value)            { markErr('f_min');     ok = false; }
  if (!document.getElementById('f_safa').value)           { markErr('f_safa');    ok = false; }
  if (!document.getElementById('f_mishpat').value)        { markErr('f_mishpat'); ok = false; }

  const email  = document.getElementById('f_email').value.trim();
  const email2 = document.getElementById('f_iymut_email').value.trim();
  const emailValid = email.indexOf('@') > 0 && email.lastIndexOf('.') > email.indexOf('@') + 1;
  if (!emailValid) { markErr('f_email'); ok = false; }
  if (!email2 || email.toLowerCase() !== email2.toLowerCase()) { markErr('f_iymut_email'); ok = false; }

  const dobD = document.getElementById('f_leda_yom').value;
  const dobM = document.getElementById('f_leda_chodesh').value;
  const dobY = document.getElementById('f_leda_shana').value;
  if (!dobD) markErr('f_leda_yom');
  if (!dobM) markErr('f_leda_chodesh');
  if (!dobY) markErr('f_leda_shana');
  if (!dobD || !dobM || !dobY) ok = false;

  if (!document.getElementById('f_avoda').value.trim()) { markErr('f_avoda'); ok = false; }

  if (!ok) {
    if (phoneValid && phone !== phone2) showErr('מספרי הניי"ד אינם תואמים');
    else if (emailValid && email.toLowerCase() !== email2.toLowerCase()) showErr('כתובות האימייל אינן תואמות');
    else showErr('יש למלא את כל השדות המסומנים באדום');
  }
  return ok;
}

function saveAndCopy() {
  if (!validate()) return;
  const fields = [
    { label: 'שם פרטי',            id: 'f_shem_prati' },
    { label: 'שם משפחה',           id: 'f_shem_mishpacha' },
    { label: 'ניי"ד',              id: 'f_naid' },
    { label: 'אימות ניי"ד',        id: 'f_iymut_naid' },
    { label: 'צבירה בפנסיה',       id: null, value: () => document.getElementById('f_tsevira').value.replace(/,/g,'') },
    { label: 'הפקדה לפנסיה',       id: null, value: () => document.getElementById('f_hafkada').value.replace(/,/g,'') },
    { label: 'חברה מתחרה',         id: 'f_chevra' },
    { label: 'שנים בחברה',         id: 'f_shanim' },
    { label: 'תאריך לידה',         id: null, value: () => {
        const y = document.getElementById('f_leda_shana').value;
        const m = document.getElementById('f_leda_chodesh').value;
        const d = document.getElementById('f_leda_yom').value;
        return [d,m,y].filter(Boolean).join('/');
    }},
    { label: 'מין',                id: 'f_min' },
    { label: 'שפת לקוח',           id: 'f_safa' },
    { label: 'אימייל',             id: 'f_email' },
    { label: 'אימות אימייל',       id: 'f_iymut_email' },
    { label: 'מקום עבודה',         id: 'f_avoda' },
    { label: 'תאריך יציאת כספים',  id: null, value: () => {
        const y = document.getElementById('f_yetsia_shana').value;
        const m = document.getElementById('f_yetsia_chodesh').value;
        const d = document.getElementById('f_yetsia_yom').value;
        return [d,m,y].filter(Boolean).join('/');
    }},
    { label: 'הנחת תשואה',         id: 'f_tnucha' },
    { label: 'ד"נ הפקדה מתחרה',   id: 'f_dn_hafkada_mit' },
    { label: 'ד"נ צבירה מתחרה',   id: 'f_dn_tsevira_mit' },
    { label: 'ד"נ הפקדה מנורה',   id: 'f_dn_hafkada_men' },
    { label: 'ד"נ צבירה מנורה',   id: 'f_dn_tsevira_men' },
    { label: 'סוג לקוח',           id: 'f_mishpat' },
    { label: 'יש איש קשר נוסף',   id: null, value: () =>
        document.getElementById('f_yesh_ish_kesher').checked ? 'כן' : ''
    },
    { label: 'קרבה',               id: 'f_karva' },
    { label: 'שם איש קשר',        id: 'f_contact_name' },
    { label: 'טלפון איש קשר',     id: 'f_contact_phone' },
    { label: 'תאריך תזכורת',      id: null, value: () => {
        const y = document.getElementById('f_fu_shana').value;
        const m = document.getElementById('f_fu_chodesh').value;
        const d = document.getElementById('f_fu_yom').value;
        return [d,m,y].filter(Boolean).join('/');
    }},
    { label: 'שעת תזכורת',        id: null, value: () => {
        const h = document.getElementById('f_fu_shaa').value;
        const min = document.getElementById('f_fu_dakot').value;
        return (h && min) ? h + ':' + min : '';
    }},
    { label: 'סיבת תזכורת',       id: 'f_fu_reason' },
    { label: 'טופס', id: null, value: () => '##טופס ' + document.getElementById('f_tofes1').value.trim() },
    { label: 'טופס', id: null, value: () => '##טופס ' + document.getElementById('f_tofes2').value.trim() },
    { label: 'טופס', id: null, value: () => '##טופס ' + document.getElementById('f_tofes3').value.trim() },
    { label: 'טופס', id: null, value: () => '##טופס ' + document.getElementById('f_tofes4').value.trim() },
  ];

  const values = fields.map(f => {
    if (f.value) return f.value();
    const el = document.getElementById(f.id);
    return el ? el.value.trim() : '';
  });

  const result = values.join('\n');

  navigator.clipboard.writeText(result).then(() => {
    const msg = document.getElementById('copy-msg');
    msg.style.display = 'inline';
    setTimeout(() => msg.style.display = 'none', 3000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = result;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const msg = document.getElementById('copy-msg');
    msg.style.display = 'inline';
    setTimeout(() => msg.style.display = 'none', 3000);
  });
}

function clearForm() {
  clearErr();
  document.querySelectorAll('input[type="text"], input[type="email"], input[type="number"]')
    .forEach(el => el.value = '');
  document.querySelectorAll('select').forEach(el => el.selectedIndex = 0);
  document.getElementById('f_yesh_ish_kesher').checked = false;
  document.getElementById('f_tzkrt').checked = false;
  toggleContact(false);
  toggleFollowUp(false);
  document.getElementById('f_tnucha').value = '8';
  document.getElementById('f_dn_hafkada_mit').value = '1.50%';
  document.getElementById('f_dn_tsevira_mit').value = '0.15%';
  document.getElementById('f_dn_hafkada_men').value = '0.90%';
  document.getElementById('f_dn_tsevira_men').value = '0.09%';
}
</script>
</body>
</html>
